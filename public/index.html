<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Qwen3.5 Vision RAG + PDF</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/core.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css" />
  <style>
    body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    pre code { border-radius: 0.5rem; }
    .image-preview { max-height: 200px; object-fit: contain; border-radius: 0.5rem; border: 1px solid #475569; }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
  
  <!-- Login Gate -->
  <div id="login-gate" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-95">
    <div class="glass p-8 rounded-2xl shadow-2xl w-96 text-center">
      <h2 class="text-2xl font-bold mb-6 text-blue-400">System Access</h2>
      <input id="username" type="text" placeholder="Username" class="w-full mb-3 p-3 rounded bg-slate-800 border border-slate-600 focus:border-blue-500 outline-none" />
      <input id="password" type="password" placeholder="Password" class="w-full mb-6 p-3 rounded bg-slate-800 border border-slate-600 focus:border-blue-500 outline-none" />
      <button onclick="attemptLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition">Authenticate</button>
      <p id="login-error" class="text-red-400 mt-4 text-sm hidden">Invalid Credentials</p>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="fixed inset-0 z-40 hidden items-center justify-center bg-black bg-opacity-80">
    <div class="glass p-6 rounded-xl w-full max-w-2xl mx-4">
      <h3 class="text-xl font-bold mb-4 text-blue-400">System Settings</h3>
      <label class="block text-sm text-slate-400 mb-2">System Prompt (Defines AI Behavior)</label>
      <textarea id="system-prompt-input" class="w-full h-32 p-3 rounded bg-slate-800 border border-slate-600 focus:border-blue-500 outline-none text-white mb-4" placeholder="You are a helpful assistant..."></textarea>
      <div class="flex justify-end gap-2">
        <button onclick="closeSettings()" class="px-4 py-2 rounded bg-slate-700 hover:bg-slate-600 text-white">Cancel</button>
        <button onclick="saveSettings()" class="px-4 py-2 rounded bg-blue-600 hover:bg-blue-700 text-white font-bold">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="flex-1 flex overflow-hidden hidden">
    <!-- Sidebar -->
    <aside class="w-72 bg-slate-900 border-r border-slate-800 p-4 flex flex-col gap-4 z-10 overflow-y-auto">
      <div class="flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-400">Qwen3.5</h1>
        <button onclick="openSettings()" class="text-slate-400 hover:text-white" title="Settings">
           <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        </button>
      </div>
      
      <div class="text-xs text-slate-400">WebGPU: <span id="gpu-status" class="text-yellow-500">Detecting...</span></div>
      <div class="mt-2">
        <div class="flex justify-between text-xs mb-1"><span>VRAM</span> <span id="vram-text">0 MB</span></div>
        <div class="w-full bg-slate-800 rounded-full h-2"><div id="vram-bar" class="bg-blue-500 h-2 rounded-full" style="width: 0%"></div></div>
      </div>

      <div class="border-t border-slate-800 pt-4 mt-2">
        <h2 class="text-sm font-bold text-slate-300 mb-2">Knowledge Base (PDF)</h2>
        <div class="text-xs text-slate-500 mb-2">Upload PDFs to enable RAG.</div>
        <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-slate-700 border-dashed rounded-lg cursor-pointer hover:bg-slate-800 hover:border-slate-500 transition">
          <div class="flex flex-col items-center justify-center pt-5 pb-6">
            <svg class="w-6 h-6 text-slate-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <p class="text-xs text-slate-400">Upload PDFs</p>
          </div>
          <input id="pdf-input" type="file" class="hidden" multiple accept=".pdf" onchange="handlePDFUpload(event)" />
        </label>
        <div id="pdf-status" class="text-xs text-green-400 mt-2 hidden">Processing...</div>
        <div id="kb-stats" class="text-xs text-slate-400 mt-1">Chunks: 0</div>
      </div>

      <div id="loading-status" class="text-xs text-slate-500 italic mt-auto">Initializing Model...</div>
    </aside>

    <!-- Chat Area -->
    <main class="flex-1 flex flex-col relative">
      <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 pb-32 scroll-smooth"></div>
      
      <!-- Input Area -->
      <div class="absolute bottom-0 left-0 right-0 p-4 bg-slate-900 border-t border-slate-800 z-20">
        <div class="max-w-4xl mx-auto flex flex-col gap-2">
          <div id="image-preview-container" class="hidden relative inline-block self-start">
            <img id="image-preview" class="image-preview" />
            <button onclick="clearImage()" class="absolute top-1 right-1 bg-red-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs hover:bg-red-700">×</button>
          </div>

          <div class="flex gap-2">
            <label class="cursor-pointer bg-slate-800 hover:bg-slate-700 text-white p-3 rounded border border-slate-600 flex items-center justify-center transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
              <input type="file" id="image-input" accept="image/*" class="hidden" onchange="handleImageSelect(event)" />
            </label>
            <input id="user-input" type="text" placeholder="Ask a question..." class="flex-1 p-3 rounded bg-slate-800 border border-slate-600 focus:border-blue-500 outline-none text-white" />
            <button id="send-btn" onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded font-bold transition disabled:opacity-50 disabled:cursor-not-allowed">Send</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- PDF.js Worker Script (Inline for simplicity) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
